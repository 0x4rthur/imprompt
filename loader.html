<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Imprompt</title>
    <style>
      /* Tema "Mono / Cream" (igual ao app); micro-janela transparente. */
      html,body{margin:0; background:transparent; overflow:hidden}
      .imprompting{
        display:inline-flex; align-items:center; gap:11px;
        background:#fcfcfd; border:1px solid rgba(24,24,27,.16);
        border-radius:5px; padding:11px 16px 11px 12px; margin:6px;
        box-shadow:0 10px 30px rgba(24,24,27,.18);
        font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
      }
      .glyph{line-height:0; display:inline-flex}
      .text{ font-size:13px; font-weight:600; color:#18181b }
      /* Três quadradinhos de cantos levemente arredondados, piscando em sequência. */
      .dots{display:inline-flex; gap:3px}
      .dots i{width:5px; height:5px; border-radius:1.5px; background:#18181b; animation:blinkdot 1.1s infinite}
      .dots i:nth-child(2){animation-delay:.18s}
      .dots i:nth-child(3){animation-delay:.36s}
      @keyframes blinkdot{0%,40%{opacity:1}60%,100%{opacity:.18}}
      @media (prefers-reduced-motion:reduce){ *{animation:none !important} }
    </style>
  </head>
  <body>
    <div class="imprompting">
      <span class="glyph">
        <svg viewBox="0 0 62 40" width="33" height="21" aria-label="Imprompt" role="img">
          <g fill="#c4c4cd">
            <rect x="2" y="4" width="5" height="32"/>
            <rect x="2" y="4" width="14" height="5"/>
            <rect x="2" y="31" width="14" height="5"/>
            <rect x="55" y="4" width="5" height="32"/>
            <rect x="46" y="4" width="14" height="5"/>
            <rect x="46" y="31" width="14" height="5"/>
          </g>
          <g fill="#18181b">
            <rect x="28.5" y="4" width="5" height="32"/>
            <rect x="22" y="4" width="18" height="5"/>
            <rect x="22" y="31" width="18" height="5"/>
          </g>
        </svg>
      </span>
      <span class="text">Imprompting…</span>
      <span class="dots"><i></i><i></i><i></i></span>
    </div>
    <script>document.addEventListener("contextmenu", function (e) { e.preventDefault(); });</script>
  </body>
</html>
